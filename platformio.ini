; PlatformIO Project Configuration File
; ESP32-C6 Feather with RFM69HCW 433MHz FeatherWing
; Project: Minka Aire 433MHz Remote for Home Assistant

[platformio]
description = ESP32 433MHz Remote for Home Assistant - Minka Aire Fan Control
default_envs = adafruit_c6_feather

[env:adafruit_c6_feather]
platform = espressif32@^6
board = adafruit_c6_feather
framework = arduino

; Board specific settings - tiny partition for more program space
board_build.partitions = huge_app.csv

; Serial monitoring
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build options
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ESPHOME_VERSION="2024.1.0"

; OTA Upload settings (configure upload_port in Home Assistant or set here)
; upload_protocol = espota
; upload_port = 192.168.1.100
; upload_flags =
;     --auth=''

; Libraries - RFM69 for 433MHz transmission
lib_deps =
    ; Adafruit RFM69 library for 433MHz radio
    https://github.com/adafruit/Adafruit-RFM69.git#1.6.5
    ; WiFi and MQTT for Home Assistant integration
    knolleary/pubsubclient@^2.8
    ; JSON handling
    bblanchon/ArduinoJson@^7.0.4

; RFM69HCW Pin Definitions (ESP32-C6 Feather STEMMA QT)
; SDA = GPIO 8, SCL = GPIO 7 (I2C0)
; RFM69 uses SPI: SCK=GPIO4, MISO=GPIO6, MOSI=GPIO5, CS=GPIO14