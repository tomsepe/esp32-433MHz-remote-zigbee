; PlatformIO Project Configuration File
; ESP32-C6 Feather + 433 MHz OOK transmitter (e.g. FS1000A)
; Project: Minka Aire 433MHz Remote for Home Assistant

[platformio]
description = ESP32 433MHz Remote for Home Assistant - Minka Aire Fan Control
default_envs = adafruit_c6_feather

[env:adafruit_c6_feather]
platform = espressif32@^6
board = adafruit_c6_feather
framework = arduino

; Board specific settings - tiny partition for more program space
board_build.partitions = huge_app.csv

; Serial monitoring
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build options
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; OTA Upload settings (configure upload_port in Home Assistant or set here)
; upload_protocol = espota
; upload_port = 192.168.1.100
; upload_flags =
;     --auth=''

; Libraries - no RF library; OOK timing replayed via GPIO to FS1000A DATA pin
lib_deps =
    knolleary/pubsubclient@^2.8
    bblanchon/ArduinoJson@^7.0.4