# Secrets file for ESPHome configuration
# Copy this file to secrets.yaml and fill in your values
# DO NOT commit secrets.yaml to version control!

# WiFi Credentials
wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# MQTT Broker (Home Assistant)
mqtt_broker: "192.168.1.100"
mqtt_username: ""
mqtt_password: ""

# OTA Password (for firmware updates)
ota_password: "your_secure_ota_password"

# API Encryption Key (generate with: esphome encryption)
api_encryption_key: "YOUR_ENCRYPTION_KEY_HERE"

# Web Server Authentication
web_username: "admin"
web_password: "your_secure_password"