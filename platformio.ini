; PlatformIO Project Configuration File
; ESP32-C6 Feather + 433 MHz OOK transmitter (e.g. FS1000A)
; Project: Minka Aire 433MHz Remote for Home Assistant

[platformio]
description = ESP32 433MHz Remote for Home Assistant - Minka Aire Fan Control
default_envs = adafruit_c6_feather

; Use pioarduino fork for Arduino + ESP32-C6 (official platform is ESP-IDF only for C6)
[env:adafruit_c6_feather]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino

; Use default partition table (OTA requires two app slots; huge_app has only one).
; Omit board_build.partitions to get default OTA-capable layout.

; Serial monitoring
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build options
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; OTA upload: first flash must be via USB; then use espota with device IP.
upload_protocol = espota
upload_port = 192.168.1.100
; If OTA_PASSWORD is set in secrets.h, add: upload_flags = --auth='your_password'

; USB/serial flash (use this env for first flash or when device is connected by USB)
[env:adafruit_c6_feather_usb]
extends = env:adafruit_c6_feather
upload_protocol = esptool
upload_port = /dev/ttyACM0
; If your port is different (e.g. ttyUSB0), pass: --upload-port /dev/ttyUSB0

; Libraries - no RF library; OOK timing replayed via GPIO to FS1000A DATA pin
lib_deps =
    knolleary/pubsubclient@^2.8
    bblanchon/ArduinoJson@^7.0.4